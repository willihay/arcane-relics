# Automatically build and draft a GitHub Release when a version tag is pushed.

name: Release Arcane Relics

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v6

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: derive release metadata
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          version="${tag_name#v}"
          gradle_version="$(grep '^mod_version=' gradle.properties | cut -d= -f2-)"
          archives_base_name="$(grep '^archives_base_name=' gradle.properties | cut -d= -f2-)"
          mod_loader="$(grep '^mod_loader=' gradle.properties | cut -d= -f2-)"
          minecraft_version="$(grep '^minecraft_version=' gradle.properties | cut -d= -f2-)"
          archive_name="${archives_base_name}-${mod_loader}-${minecraft_version}"

          if [[ "${version}" == "${tag_name}" ]]; then
            echo "Expected a tag beginning with 'v', got '${tag_name}'." >&2
            exit 1
          fi

          if [[ "${version}" != "${gradle_version}" ]]; then
            echo "Tag version '${version}' does not match gradle.properties mod_version '${gradle_version}'." >&2
            exit 1
          fi

          {
            echo "tag_name=${tag_name}"
            echo "version=${version}"
            echo "jar_path=build/libs/${archive_name}-${version}.jar"
            echo "release_notes_path=${RUNNER_TEMP}/release-notes.md"
          } >> "${GITHUB_ENV}"

      - name: extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          awk -v version="${version}" '
            $0 == "## [" version "]" { in_section=1; next }
            /^## \[/ && in_section { exit }
            in_section { print }
          ' CHANGELOG.md > "${release_notes_path}"

          if [[ ! -s "${release_notes_path}" ]]; then
            echo "Could not find a changelog section for version ${version}." >&2
            exit 1
          fi

      - name: build release artifacts
        run: ./gradlew build --no-daemon

      - name: verify release jar exists
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "${jar_path}" ]]; then
            echo "Expected release jar '${jar_path}' was not found." >&2
            exit 1
          fi

      - name: draft github release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.tag_name }}
          name: Arcane Relics ${{ env.version }}
          body_path: ${{ env.release_notes_path }}
          files: ${{ env.jar_path }}
          draft: true
