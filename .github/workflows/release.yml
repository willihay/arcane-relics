# Automatically build and draft a GitHub Release when a version tag is pushed.

name: Release Arcane Relics

on:
  push:
    tags:
      - "v*"
      - "mc*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "microsoft"

      - name: setup gradle
        uses: gradle/actions/setup-gradle@v6

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: derive release metadata
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          gradle_version="$(grep '^mod_version=' gradle.properties | cut -d= -f2-)"
          archives_base_name="$(grep '^archives_base_name=' gradle.properties | cut -d= -f2-)"
          mod_loader="$(grep '^mod_loader=' gradle.properties | cut -d= -f2-)"
          minecraft_version="$(grep '^minecraft_version=' gradle.properties | cut -d= -f2-)"
          tag_minecraft_version=""

          if [[ "${tag_name}" =~ (^|[+\\-_/])v([0-9]+(\.[0-9]+)*)($|[+\\-_/]) ]]; then
            version="${BASH_REMATCH[2]}"
          else
            echo "Expected a tag containing a version segment like 'v1.6.2', got '${tag_name}'." >&2
            exit 1
          fi

          if [[ "${tag_name}" =~ (^|[+\\-_/])mc([0-9]+(\.[0-9]+)*)($|[+\\-_/]) ]]; then
            tag_minecraft_version="${BASH_REMATCH[2]}"
          fi

          archive_name="${archives_base_name}-${mod_loader}-${minecraft_version}"

          if [[ "${version}" != "${gradle_version}" ]]; then
            echo "Tag version '${version}' does not match gradle.properties mod_version '${gradle_version}'." >&2
            exit 1
          fi

          if [[ -n "${tag_minecraft_version}" && "${tag_minecraft_version}" != "${minecraft_version}" ]]; then
            echo "Tag Minecraft version '${tag_minecraft_version}' does not match gradle.properties minecraft_version '${minecraft_version}'." >&2
            exit 1
          fi

          release_title="Arcane Relics ${version}"
          if [[ -n "${tag_minecraft_version}" ]]; then
            release_title="${release_title} for Minecraft ${tag_minecraft_version}"
          fi

          {
            echo "tag_name=${tag_name}"
            echo "version=${version}"
            echo "jar_path=build/libs/${archive_name}-${version}.jar"
            echo "release_notes_path=${RUNNER_TEMP}/release-notes.md"
            echo "release_title=${release_title}"
          } >> "${GITHUB_ENV}"

      - name: extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail

          awk -v version="${version}" '
            $0 == "## [" version "]" { in_section=1; next }
            /^## \[/ && in_section { exit }
            in_section { print }
          ' CHANGELOG.md > "${release_notes_path}"

          if [[ ! -s "${release_notes_path}" ]]; then
            echo "Could not find a changelog section for version ${version}." >&2
            exit 1
          fi

      - name: build release artifacts
        run: ./gradlew build --no-daemon

      - name: verify release jar exists
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "${jar_path}" ]]; then
            echo "Expected release jar '${jar_path}' was not found." >&2
            exit 1
          fi

      - name: draft github release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.tag_name }}
          name: ${{ env.release_title }}
          body_path: ${{ env.release_notes_path }}
          files: ${{ env.jar_path }}
          draft: true
